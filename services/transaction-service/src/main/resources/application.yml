spring:
  application:
    name: transaction-service
  datasource:
    url: jdbc:postgresql://localhost:5432/transactions
    username: sa
    password:
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: localhost:9092
  redis:
    host: localhost
    port: 6379
server.port: 8080
account-service:
  url: http://localhost:8080
outbox:
  batch-size: 100
  poll-interval-ms: 500
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus