server:
  port: 8761

spring:
  application:
    name: discovery-server
  security:
    user:
      name: eureka       # basic auth for clients
      password: password  # override via secrets

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
  server:
    enable-self-preservation: false   # good for dev; keep true in prod